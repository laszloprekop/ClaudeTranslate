<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Translate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
          rel="stylesheet"/>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --text: #1f2024;
            --muted: #6b6f76;
            --faint: #9aa0a6;
            --line: #e7e9ec;
            --accent: #4f46e5;
            --accent-soft: #eef0fe;
            --radius: 14px;
            --shadow: 0 1px 2px rgba(20, 20, 40, .06), 0 6px 24px rgba(20, 20, 40, .06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #131417;
                --surface: #1c1e22;
                --text: #ecedef;
                --muted: #a3a8b0;
                --faint: #71757d;
                --line: #2a2d33;
                --accent: #8b85ff;
                --accent-soft: #25264a;
                --shadow: 0 1px 2px rgba(0, 0, 0, .4), 0 8px 28px rgba(0, 0, 0, .35);
            }
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            padding: 28px 16px 64px;
        }

        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            user-select: none;
        }

        .app {
            width: 100%;
            max-width: 680px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 600;
            font-size: 19px;
        }

        .brand .material-symbols-outlined {
            color: var(--accent);
            font-size: 24px;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chip {
            font-size: 12.5px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 5px 11px;
            border-radius: 999px;
            letter-spacing: .2px;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s;
        }

        .icon-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .icon-btn .material-symbols-outlined {
            font-size: 21px;
        }

        .icon-btn.small {
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }

        .icon-btn.small .material-symbols-outlined {
            font-size: 17px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .settings {
            padding: 18px;
            margin-bottom: 16px;
        }

        .settings[hidden] {
            display: none;
        }

        .settings label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin: 0 0 6px;
        }

        .settings label .hint {
            font-weight: 400;
            color: var(--faint);
        }

        .settings textarea, .settings input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            resize: vertical;
            outline: none;
        }

        .settings textarea:focus, .settings input:focus {
            border-color: var(--accent);
        }

        .settings textarea {
            min-height: 78px;
            margin-bottom: 16px;
        }

        .settings .note {
            font-size: 12.5px;
            color: var(--faint);
            line-height: 1.5;
            margin: 10px 0 0;
        }

        .input-card {
            padding: 8px 8px 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        #input {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-family: inherit;
            font-size: 17px;
            line-height: 1.5;
            color: var(--text);
            padding: 12px 0;
            max-height: 200px;
            min-height: 28px;
        }

        #input::placeholder {
            color: var(--faint);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-bottom: 4px;
        }

        .primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            padding: 9px 14px 9px 12px;
            border-radius: 10px;
            transition: opacity .15s, transform .05s;
        }

        .primary:hover {
            opacity: .92;
        }

        .primary:active {
            transform: translateY(1px);
        }

        .primary:disabled {
            opacity: .45;
            cursor: default;
        }

        .primary .material-symbols-outlined {
            font-size: 19px;
        }

        .langs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 14px;
        }

        .lang-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 13.5px;
            font-weight: 500;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 7px 14px;
            cursor: pointer;
            user-select: none;
            transition: background .15s, color .15s, border-color .15s;
        }

        .lang-chip input {
            display: none;
        }

        .lang-chip .flag {
            font-size: 16px;
        }

        .lang-chip:hover {
            border-color: var(--accent);
        }

        .lang-chip:has(input:checked) {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .error {
            margin-top: 16px;
            padding: 14px 18px;
            color: #d14343;
            font-size: 14px;
            line-height: 1.5;
        }

        .error[hidden] {
            display: none;
        }

        .history {
            margin-top: 26px;
        }

        .history[hidden] {
            display: none;
        }

        .history-head {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin: 0 4px 10px;
        }

        .history h2 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: var(--faint);
            margin: 0;
        }

        .history .clear-history {
            font-family: inherit;
            font-size: 12px;
            color: var(--faint);
            background: none;
            border: none;
            cursor: pointer;
        }

        .history .clear-history:hover {
            color: var(--accent);
        }

        .entry {
            padding: 14px 16px;
            margin-bottom: 10px;
        }

        .entry .entry-head {
            margin-bottom: 10px;
        }

        .entry .dir {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 3px 9px;
            border-radius: 999px;
            letter-spacing: .3px;
        }

        .entry .pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        @media (max-width: 540px) {
            .entry .pair {
                grid-template-columns: 1fr;
            }
        }

        .entry .col {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            min-width: 0;
        }

        .entry .col .txt {
            flex: 1;
            min-width: 0;
            font-size: 15px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
            padding-top: 4px;
        }

        .entry .col.src .txt {
            color: var(--muted);
        }

        .entry .col.dst .txt {
            color: var(--text);
            font-weight: 500;
        }

        .entry .col.src {
            border-right: 1px solid var(--line);
            padding-right: 14px;
        }

        @media (max-width: 540px) {
            .entry .col.src {
                border-right: none;
                border-bottom: 1px solid var(--line);
                padding-right: 0;
                padding-bottom: 10px;
            }
        }

        .spin {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff66;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .spin {
                animation: none;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="brand"><span class="material-symbols-outlined">translate</span> Translate</div>
        <div class="right">
            <span class="chip">auto-detect</span>
            <button class="icon-btn" id="settingsBtn" title="Settings"><span
                    class="material-symbols-outlined">tune</span></button>
        </div>
    </header>

    <section class="settings card" id="settings" hidden>
        <label for="style">Writing style</label>
        <textarea id="style"></textarea>


        <p class="note">Inside Claude this stays empty and works automatically. As a saved file, paste your own key —
            it's stored only in this browser and sent straight to Anthropic. For anything shared, put the key behind a
            small server proxy instead.</p>
    </section>

    <section class="input-card card">
        <textarea id="input" rows="1" placeholder="Type in any language…"></textarea>
        <div class="input-actions">
            <button class="icon-btn" id="clearBtn" title="Clear"><span class="material-symbols-outlined">close</span>
            </button>
            <button class="primary" id="goBtn"><span class="material-symbols-outlined">arrow_forward</span> Translate
            </button>
        </div>
    </section>

    <div class="langs" id="langs"></div>

    <section class="error card" id="error" hidden></section>

    <section class="history" id="history" hidden>
        <div class="history-head">
            <h2>Translations</h2>
            <button class="clear-history" id="clearHistoryBtn">clear</button>
        </div>
        <div id="historyList"></div>
    </section>
</div>

<script>
  const DEFAULT_STYLE = "Natural, idiomatic, slightly casual. Sound like a fluent bilingual person writing quickly to a colleague — not a textbook. Keep contractions and informal phrasing. Don't translate literally; translate the intent. Leave technical/code terms and proper nouns untouched.";

  const LANGUAGES = [
    {name: "English", native: "English", flag: "🇬🇧", code: "en"},
    {name: "Swedish", native: "Svenska", flag: "🇸🇪", code: "sv"},
    {name: "Hungarian", native: "Magyar", flag: "🇭🇺", code: "hu"},
    {name: "German", native: "Deutsch", flag: "🇩🇪", code: "de"},
    {name: "French", native: "Français", flag: "🇫🇷", code: "fr"},
    {name: "Spanish", native: "Español", flag: "🇪🇸", code: "es"},
  ];
  const DEFAULT_TARGETS = ["English", "Swedish"];

  const $ = (id) => document.getElementById(id);
  const els = {
    input: $("input"), go: $("goBtn"), clear: $("clearBtn"),
    error: $("error"), langs: $("langs"),
    history: $("history"), historyList: $("historyList"), clearHistory: $("clearHistoryBtn"),
    settings: $("settings"), settingsBtn: $("settingsBtn"), style: $("style"),
  };

  // Storage: prefers Claude's artifact store; falls back to localStorage when run standalone.
  const Store = {
    async get(k) {
      try {
        if (typeof window !== "undefined" && window.storage) {
          const r = await window.storage.get(k);
          return r ? r.value : null;
        }
        return window.localStorage.getItem(k);
      } catch {
        return null;
      }
    },
    async set(k, v) {
      try {
        if (typeof window !== "undefined" && window.storage) {
          await window.storage.set(k, v);
          return;
        }
        window.localStorage.setItem(k, v);
      } catch { /* in-memory only */
      }
    },
  };

  let history = [];
  let targets = [...DEFAULT_TARGETS];

  (async function init() {
    els.style.value = (await Store.get("tr:style")) || DEFAULT_STYLE;
    try {
      history = JSON.parse((await Store.get("tr:history")) || "[]");
    } catch {
      history = [];
    }
    try {
      const saved = JSON.parse((await Store.get("tr:targets")) || "null");
      if (Array.isArray(saved) && saved.length) targets = saved;
    } catch { /* keep defaults */
    }
    renderLangs();
    renderHistory();
    autoGrow();
    els.input.focus();
  })();

  els.style.addEventListener("blur", () => Store.set("tr:style", els.style.value));
  els.settingsBtn.addEventListener("click", () => {
    els.settings.hidden = !els.settings.hidden;
  });
  els.clear.addEventListener("click", () => {
    els.input.value = "";
    autoGrow();
    els.input.focus();
  });
  els.go.addEventListener("click", run);
  els.clearHistory.addEventListener("click", () => {
    history = [];
    Store.set("tr:history", "[]");
    renderHistory();
  });

  els.input.addEventListener("input", autoGrow);
  els.input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      run();
    }
  });

  function autoGrow() {
    els.input.style.height = "auto";
    els.input.style.height = Math.min(els.input.scrollHeight, 200) + "px";
  }

  function renderLangs() {
    els.langs.innerHTML = "";
    LANGUAGES.forEach((l) => {
      const label = document.createElement("label");
      label.className = "lang-chip";
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = targets.includes(l.name);
      cb.addEventListener("change", () => {
        targets = cb.checked ? [...targets, l.name] : targets.filter((t) => t !== l.name);
        Store.set("tr:targets", JSON.stringify(targets));
      });
      label.appendChild(cb);
      label.insertAdjacentHTML("beforeend",
        `<span class="flag">${l.flag}</span><span>${l.native}</span>`);
      els.langs.appendChild(label);
    });
  }

  async function run() {
    const text = els.input.value.trim();
    if (!text) return;
    if (!targets.length) {
      showError("Pick at least one target language.");
      return;
    }
    setBusy(true);
    els.error.hidden = true;
    try {
      const results = await Promise.all(targets.map((t) => translate(text, t)));
      const fresh = results.filter((r) => r.source !== r.target);
      if (!fresh.length) {
        showError("The input is already in every selected language — nothing to translate.");
        return;
      }
      history.unshift(...fresh.map((r) => ({input: text, ...r})));
      history = history.slice(0, 30);
      Store.set("tr:history", JSON.stringify(history));
      renderHistory();
      els.input.value = "";
      autoGrow();
    } catch (e) {
      showError(describeError(e));
    } finally {
      setBusy(false);
      els.input.focus();
    }
  }

  function showError(msg) {
    els.error.hidden = false;
    els.error.textContent = msg;
  }

  function tag(lang) {
    const l = LANGUAGES.find((x) => x.name === lang);
    return l ? l.code : "??";
  }

  function describeError(e) {
    return "Couldn't translate: " + (e.message || e);
  }

  async function translate(text, target) {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text, style: els.style.value, target
      }),
    });
    if (!res.ok) throw new Error("API " + res.status);
    const p = await res.json();
    return {source: p.source, target: p.target, translation: p.translation};
  }

  function copyButton(getText) {
    const btn = document.createElement("button");
    btn.className = "icon-btn small";
    btn.title = "Copy";
    btn.innerHTML = '<span class="material-symbols-outlined">content_copy</span>';
    btn.addEventListener("click", () => {
      navigator.clipboard?.writeText(getText());
      const icon = btn.querySelector(".material-symbols-outlined");
      icon.textContent = "check";
      setTimeout(() => {
        icon.textContent = "content_copy";
      }, 1200);
    });
    return btn;
  }

  function renderHistory() {
    if (!history.length) {
      els.history.hidden = true;
      return;
    }
    els.history.hidden = false;
    els.historyList.innerHTML = "";
    history.forEach((h) => {
      const entry = document.createElement("div");
      entry.className = "entry card";
      entry.innerHTML =
        `<div class="entry-head"><span class="dir">${tag(h.source)} → ${tag(h.target)}</span></div>` +
        `<div class="pair">` +
        `<div class="col src"><div class="txt"></div></div>` +
        `<div class="col dst"><div class="txt"></div></div>` +
        `</div>`;
      entry.querySelector(".src .txt").textContent = h.input;
      entry.querySelector(".dst .txt").textContent = h.translation;
      entry.querySelector(".col.src").appendChild(copyButton(() => h.input));
      entry.querySelector(".col.dst").appendChild(copyButton(() => h.translation));
      els.historyList.appendChild(entry);
    });
  }

  function setBusy(b) {
    els.go.disabled = b;
    els.go.innerHTML = b
      ? '<span class="spin"></span>'
      : '<span class="material-symbols-outlined">arrow_forward</span> Translate';
  }
</script>
</body>
</html>
