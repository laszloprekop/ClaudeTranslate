<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Translate · EN ⇄ SV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
          rel="stylesheet"/>
    <style>
        :root {
            --bg: #f5f6f8;
            --surface: #ffffff;
            --text: #1f2024;
            --muted: #6b6f76;
            --faint: #9aa0a6;
            --line: #e7e9ec;
            --accent: #4f46e5;
            --accent-soft: #eef0fe;
            --radius: 14px;
            --shadow: 0 1px 2px rgba(20, 20, 40, .06), 0 6px 24px rgba(20, 20, 40, .06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #131417;
                --surface: #1c1e22;
                --text: #ecedef;
                --muted: #a3a8b0;
                --faint: #71757d;
                --line: #2a2d33;
                --accent: #8b85ff;
                --accent-soft: #25264a;
                --shadow: 0 1px 2px rgba(0, 0, 0, .4), 0 8px 28px rgba(0, 0, 0, .35);
            }
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: "IBM Plex Sans", system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            padding: 28px 16px 64px;
        }

        .material-symbols-outlined {
            font-family: "Material Symbols Outlined";
            font-weight: normal;
            font-style: normal;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            font-feature-settings: 'liga';
            user-select: none;
        }

        .app {
            width: 100%;
            max-width: 620px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 9px;
            font-weight: 600;
            font-size: 19px;
        }

        .brand .material-symbols-outlined {
            color: var(--accent);
            font-size: 24px;
        }

        .right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chip {
            font-size: 12.5px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 5px 11px;
            border-radius: 999px;
            letter-spacing: .2px;
        }

        .icon-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s;
        }

        .icon-btn:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        .icon-btn .material-symbols-outlined {
            font-size: 21px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .settings {
            padding: 18px;
            margin-bottom: 16px;
        }

        .settings[hidden] {
            display: none;
        }

        .settings label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin: 0 0 6px;
        }

        .settings label .hint {
            font-weight: 400;
            color: var(--faint);
        }

        .settings textarea, .settings input {
            width: 100%;
            font-family: inherit;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 12px;
            resize: vertical;
            outline: none;
        }

        .settings textarea:focus, .settings input:focus {
            border-color: var(--accent);
        }

        .settings textarea {
            min-height: 78px;
            margin-bottom: 16px;
        }

        .settings .note {
            font-size: 12.5px;
            color: var(--faint);
            line-height: 1.5;
            margin: 10px 0 0;
        }

        .input-card {
            padding: 8px 8px 8px 16px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        #input {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            font-family: inherit;
            font-size: 17px;
            line-height: 1.5;
            color: var(--text);
            padding: 12px 0;
            max-height: 200px;
            min-height: 28px;
        }

        #input::placeholder {
            color: var(--faint);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-bottom: 4px;
        }

        .primary {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: #fff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            padding: 9px 14px 9px 12px;
            border-radius: 10px;
            transition: opacity .15s, transform .05s;
        }

        .primary:hover {
            opacity: .92;
        }

        .primary:active {
            transform: translateY(1px);
        }

        .primary:disabled {
            opacity: .45;
            cursor: default;
        }

        .primary .material-symbols-outlined {
            font-size: 19px;
        }

        .output {
            margin-top: 16px;
            padding: 16px 18px;
        }

        .output[hidden] {
            display: none;
        }

        .output-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .output-head .dir {
            font-size: 12px;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-soft);
            padding: 3px 9px;
            border-radius: 999px;
            letter-spacing: .3px;
        }

        #translation {
            font-size: 18px;
            line-height: 1.55;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .error {
            color: #d14343;
            font-size: 14px;
            line-height: 1.5;
        }

        .error[hidden] {
            display: none;
        }

        .recents {
            margin-top: 26px;
        }

        .recents[hidden] {
            display: none;
        }

        .recents h2 {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .6px;
            text-transform: uppercase;
            color: var(--faint);
            margin: 0 0 10px 4px;
        }

        .rec {
            display: flex;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background .12s;
        }

        .rec:hover {
            background: var(--surface);
        }

        .rec .tag {
            font-size: 11px;
            color: var(--faint);
            font-weight: 500;
            padding-top: 3px;
            min-width: 42px;
            letter-spacing: .3px;
        }

        .rec .pair {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .rec .src {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .rec .dst {
            font-size: 14.5px;
            color: var(--text);
        }

        .rec .src, .rec .dst {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .spin {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #ffffff66;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .spin {
                animation: none;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <header>
        <div class="brand"><span class="material-symbols-outlined">translate</span> Translate</div>
        <div class="right">
            <span class="chip">auto · en ⇄ sv</span>
            <button class="icon-btn" id="settingsBtn" title="Settings"><span
                    class="material-symbols-outlined">tune</span></button>
        </div>
    </header>

    <section class="settings card" id="settings" hidden>
        <label for="style">Writing style</label>
        <textarea id="style"></textarea>


        <p class="note">Inside Claude this stays empty and works automatically. As a saved file, paste your own key —
            it's stored only in this browser and sent straight to Anthropic. For anything shared, put the key behind a
            small server proxy instead.</p>
    </section>

    <section class="input-card card">
        <textarea id="input" rows="1" placeholder="Type in English or Swedish…"></textarea>
        <div class="input-actions">
            <button class="icon-btn" id="clearBtn" title="Clear"><span class="material-symbols-outlined">close</span>
            </button>
            <button class="primary" id="goBtn"><span class="material-symbols-outlined">arrow_forward</span> Translate
            </button>
        </div>
    </section>

    <section class="output card" id="output" hidden>
        <div class="output-head">
            <span class="dir" id="outDir"></span>
            <button class="icon-btn" id="copyBtn" title="Copy"><span
                    class="material-symbols-outlined">content_copy</span></button>
        </div>
        <div id="translation"></div>
        <div class="error" id="error" hidden></div>
    </section>

    <section class="recents" id="recents" hidden>
        <h2>Recent</h2>
        <div id="recentList"></div>
    </section>
</div>

<script>
  const DEFAULT_STYLE = "Natural, idiomatic, slightly casual. Sound like a fluent bilingual person writing quickly to a colleague — not a textbook. Keep contractions and informal phrasing. Don't translate literally; translate the intent. Leave technical/code terms and proper nouns untouched.";

  const $ = (id) => document.getElementById(id);
  const els = {
    input: $("input"), go: $("goBtn"), clear: $("clearBtn"),
    output: $("output"), outDir: $("outDir"), translation: $("translation"),
    error: $("error"), copy: $("copyBtn"), recents: $("recents"), recentList: $("recentList"),
    settings: $("settings"), settingsBtn: $("settingsBtn"), style: $("style"),
  };

  // Storage: prefers Claude's artifact store; falls back to localStorage when run standalone.
  const Store = {
    async get(k) {
      try {
        if (typeof window !== "undefined" && window.storage) {
          const r = await window.storage.get(k);
          return r ? r.value : null;
        }
        return window.localStorage.getItem(k);
      } catch {
        return null;
      }
    },
    async set(k, v) {
      try {
        if (typeof window !== "undefined" && window.storage) {
          await window.storage.set(k, v);
          return;
        }
        window.localStorage.setItem(k, v);
      } catch { /* in-memory only */
      }
    },
  };

  let history = [];

  (async function init() {
    els.style.value = (await Store.get("tr:style")) || DEFAULT_STYLE;
    try {
      history = JSON.parse((await Store.get("tr:history")) || "[]");
    } catch {
      history = [];
    }
    renderRecents();
    autoGrow();
    els.input.focus();
  })();

  els.style.addEventListener("blur", () => Store.set("tr:style", els.style.value));
  els.settingsBtn.addEventListener("click", () => {
    els.settings.hidden = !els.settings.hidden;
  });
  els.clear.addEventListener("click", () => {
    els.input.value = "";
    autoGrow();
    els.input.focus();
  });
  els.go.addEventListener("click", run);
  els.copy.addEventListener("click", () => {
    navigator.clipboard?.writeText(els.translation.textContent);
    els.copy.querySelector(".material-symbols-outlined").textContent = "check";
    setTimeout(() => {
      els.copy.querySelector(".material-symbols-outlined").textContent = "content_copy";
    }, 1200);
  });

  els.input.addEventListener("input", autoGrow);
  els.input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      run();
    }
  });

  function autoGrow() {
    els.input.style.height = "auto";
    els.input.style.height = Math.min(els.input.scrollHeight, 200) + "px";
  }

  async function run() {
    const text = els.input.value.trim();
    if (!text) return;
    setBusy(true);
    els.error.hidden = true;
    try {
      const out = await translate(text);
      els.outDir.textContent = `${tag(out.source)} → ${tag(out.target)}`;
      els.translation.textContent = out.translation;
      els.output.hidden = false;
      history.unshift({input: text, ...out});
      history = history.slice(0, 8);
      Store.set("tr:history", JSON.stringify(history));
      renderRecents();
      els.input.value = "";
      autoGrow();
    } catch (e) {
      els.output.hidden = false;
      els.translation.textContent = "";
      els.error.hidden = false;
      els.error.textContent = describeError(e);
    } finally {
      setBusy(false);
      els.input.focus();
    }
  }

  function tag(lang) {
    return ({English: "en", Swedish: "sv"})[lang] || "??";
  }

  function describeError(e) {
    return "Couldn't translate: " + (e.message || e);
  }

  async function translate(text) {
    const res = await fetch("/api/translate", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        text, style: els.style.value
      }),
    });
    if (!res.ok) throw new Error("API " + res.status);
    const p = await res.json();
    return {source: p.source, target: p.target, translation: p.translation};
  }

  function renderRecents() {
    if (!history.length) {
      els.recents.hidden = true;
      return;
    }
    els.recents.hidden = false;
    els.recentList.innerHTML = "";
    history.forEach((h) => {
      const row = document.createElement("div");
      row.className = "rec";
      row.innerHTML =
        `<span class="tag">${tag(h.source)}→${tag(h.target)}</span>` +
        `<span class="pair"><span class="src"></span><span class="dst"></span></span>`;
      row.querySelector(".src").textContent = h.input;
      row.querySelector(".dst").textContent = h.translation;
      row.addEventListener("click", () => {
        navigator.clipboard?.writeText(h.translation);
        els.outDir.textContent = `${tag(h.source)} → ${tag(h.target)}`;
        els.translation.textContent = h.translation;
        els.error.hidden = true;
        els.output.hidden = false;
      });
      els.recentList.appendChild(row);
    });
  }

  function setBusy(b) {
    els.go.disabled = b;
    els.go.innerHTML = b
      ? '<span class="spin"></span>'
      : '<span class="material-symbols-outlined">arrow_forward</span> Translate';
  }
</script>
</body>
</html>
